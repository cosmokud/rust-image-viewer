name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      DEPLOY_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Fail if release already exists for tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${REPO}/releases/tags/${DEPLOY_TAG}"
          status=$(curl -sS -o release.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")
          if [[ "${status}" == "200" ]]; then
            echo "release already exists for tag ${DEPLOY_TAG}; refusing to overwrite"
            cat release.json
            exit 1
          fi
          if [[ "${status}" != "404" ]]; then
            echo "unexpected API status while checking tag ${DEPLOY_TAG}: ${status}"
            cat release.json || true
            exit 1
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_TAG }}

      - name: Setup GStreamer
        id: setup_gstreamer
        uses: blinemedical/setup-gstreamer@v1.4.0
        with:
          version: "1.26.11"
          arch: "x86_64"
          msiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc/gstreamer-1.0-msvc-x86_64-1.26.11.msi
          devMsiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc/gstreamer-1.0-devel-msvc-x86_64-1.26.11.msi

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        shell: pwsh
        run: cargo build --release

      - name: Resolve installer metadata
        id: installer_meta
        shell: pwsh
        run: |
          $tag = "${{ env.DEPLOY_TAG }}"
          if ($tag.StartsWith("v")) {
            $tag = $tag.Substring(1)
          }

          if ($tag -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag must be v<major>.<minor>.<patch>; got '${{ env.DEPLOY_TAG }}'."
          }

      - name: Install WiX Toolset v7
        shell: pwsh
        run: |
          $hasWix = dotnet tool list --global | Select-String -Pattern '^\s*wix\s'
          if ($hasWix) {
            dotnet tool update --global wix --version 7.0.0
          } else {
            dotnet tool install --global wix --version 7.0.0
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix eula accept wix7 --acceptEula yes

      - name: Build WiX installer (AppData + bundled GStreamer)
        id: build_installer
        shell: pwsh
        run: |
          $outputPath = Join-Path $PWD "target\wix\rust-image-viewer-installer.msi"
          .\scripts\build-wix-installer.ps1 `
            -Configuration release `
            -WorkspaceRoot "$PWD" `
            -OutputMsi $outputPath

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "msi_path=$outputPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-${{ env.DEPLOY_TAG }}
          path: |
            ${{ steps.build_installer.outputs.msi_path }}
            target/release/rust-image-viewer.exe

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.DEPLOY_TAG }}" `
            "${{ steps.build_installer.outputs.msi_path }}" `
            "target\release\rust-image-viewer.exe" `
            --title "${{ env.DEPLOY_TAG }}" `
            --generate-notes
