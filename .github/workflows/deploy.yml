name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Fail if release already exists for tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          status=$(curl -sS -o release.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")
          if [[ "${status}" == "200" ]]; then
            echo "release already exists for tag ${TAG}; refusing to overwrite"
            cat release.json
            exit 1
          fi
          if [[ "${status}" != "404" ]]; then
            echo "unexpected API status while checking tag ${TAG}: ${status}"
            cat release.json || true
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GStreamer
        id: setup_gstreamer
        uses: blinemedical/setup-gstreamer@v1.4.0
        with:
          version: "1.27.90"
          arch: "x86_64"
          msiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.27.90/msvc/gstreamer-1.0-msvc-x86_64-1.27.90.msi
          devMsiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.27.90/msvc/gstreamer-1.0-devel-msvc-x86_64-1.27.90.msi

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        shell: pwsh
        run: cargo build --release

      - name: Resolve installer metadata
        id: installer_meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) {
            $tag = $tag.Substring(1)
          }

          if ($tag -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag must be v<major>.<minor>.<patch>; got '${{ github.ref_name }}'."
          }

          $msiName = "rust-image-viewer-$tag.msi"

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "product_version=$tag"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "msi_name=$msiName"

      - name: Install WiX Toolset v7
        shell: pwsh
        run: |
          $hasWix = dotnet tool list --global | Select-String -Pattern '^\s*wix\s'
          if ($hasWix) {
            dotnet tool update --global wix --version 7.0.0
          } else {
            dotnet tool install --global wix --version 7.0.0
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix eula accept wix7 --acceptEula yes

      - name: Build WiX installer (AppData + bundled GStreamer)
        id: build_installer
        shell: pwsh
        run: |
          $outputPath = Join-Path $PWD "target\wix\${{ steps.installer_meta.outputs.msi_name }}"
          .\scripts\build-wix-installer.ps1 `
            -ProductVersion "${{ steps.installer_meta.outputs.product_version }}" `
            -Configuration release `
            -WorkspaceRoot "$PWD" `
            -OutputMsi $outputPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-${{ github.ref_name }}
          path: ${{ steps.build_installer.outputs.msi_path }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.build_installer.outputs.msi_path }}
