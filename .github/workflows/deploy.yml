name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
      - "!*-*"

jobs:
  windows-installers:
    runs-on: windows-latest
    permissions:
      contents: write
    # SECURITY: Ensure this job strictly runs on tags
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # IDEMPOTENCY: Only run this strict check on the very first attempt.
      # If you click "Re-run failed jobs", this skips so you can finish the release.
      - name: Fail if release already exists for tag
        if: github.run_attempt == '1'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          status=$(curl -sS -o release.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")
          if [[ "${status}" == "200" ]]; then
            echo "release already exists for tag ${TAG}; refusing to overwrite"
            cat release.json
            exit 1
          fi
          if [[ "${status}" != "404" ]]; then
            echo "unexpected API status while checking tag ${TAG}: ${status}"
            cat release.json || true
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GStreamer
        id: setup_gstreamer
        uses: blinemedical/setup-gstreamer@v1.4.0
        with:
          version: "1.26.11"
          arch: "x86_64"
          msiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc/gstreamer-1.0-msvc-x86_64-1.26.11.msi
          devMsiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc/gstreamer-1.0-devel-msvc-x86_64-1.26.11.msi

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        shell: pwsh
        run: cargo install cargo-packager --locked

      - name: Build Windows installers
        shell: pwsh
        run: .\build-installers.ps1

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-installers-${{ github.ref_name }}
          path: |
            target/packager/*-setup.exe
            target/packager/*-setup-no-gstreamer.exe
            target/release/rust-image-viewer.exe
          if-no-files-found: error

      - name: Extract Changelog
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"

          # Extract changelog section for the current version
          awk '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            target/packager/*-setup.exe
            target/packager/*-setup-no-gstreamer.exe
            target/release/rust-image-viewer.exe
