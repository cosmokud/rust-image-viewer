name: Manual Deploy By Tag

on:
  workflow_dispatch:
    inputs:
      tag_to_build:
        description: "The exact tag to build and release"
        required: true
        type: string

jobs:
  windows-installers:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # SECURITY: Validate input to prevent someone from typing "main" or injecting shell commands
      - name: Validate tag format
        env:
          INPUT_TAG: ${{ inputs.tag_to_build }}
        shell: bash
        run: |
          if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Error: Tag must start with 'v' followed by semantic versioning (e.g., v1.0.0)"
            exit 1
          fi

      # IDEMPOTENCY: Check if release already exists.
      # Prevents you from accidentally overwriting a good release via a typo in the manual input.
      - name: Fail if release already exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag_to_build }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          status=$(curl -sS -o release.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")
          if [[ "${status}" == "200" ]]; then
            echo "release already exists for tag ${TAG}; refusing to overwrite"
            cat release.json
            exit 1
          fi
          if [[ "${status}" != "404" ]]; then
            echo "unexpected API status while checking tag ${TAG}: ${status}"
            cat release.json || true
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_to_build }}

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        shell: pwsh
        run: cargo install cargo-packager --locked

      - name: Build Windows installers
        shell: pwsh
        run: .\build-installers.ps1

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-installers-${{ inputs.tag_to_build }}
          path: |
            target/packager/*.exe
            target/release/rust-image-viewer.exe
          if-no-files-found: error

      - name: Extract Changelog
        shell: bash
        run: |
          TAG_NAME="${{ inputs.tag_to_build }}"
          VERSION="${TAG_NAME#v}"

          # Extract changelog section for the current version
          awk '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_to_build }}
          name: ${{ inputs.tag_to_build }}
          body_path: release_notes.md
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: false
          files: |
            target/packager/*.exe
            target/release/rust-image-viewer.exe
