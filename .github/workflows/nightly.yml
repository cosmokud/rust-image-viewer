name: Nightly Build

on:
  workflow_dispatch:

jobs:
  nightly:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GStreamer manually
        shell: pwsh
        run: |
          # URLs for the runtime and development installers
          $gstUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/1.28.2/msvc/gstreamer-1.0-msvc-x86_64-1.28.2.exe"
          $gstDevUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/1.28.2/msvc/gstreamer-1.0-devel-msvc-x86_64-1.28.2.exe"

          Write-Host "Downloading GStreamer Runtime..."
          Invoke-WebRequest -Uri $gstUrl -OutFile "gstreamer.exe"

          Write-Host "Downloading GStreamer Devel (Required for Rust build)..."
          Invoke-WebRequest -Uri $gstDevUrl -OutFile "gstreamer-devel.exe"

          # Run the installers silently (standard /quiet flag for WiX bootstrapper EXEs)
          Write-Host "Installing GStreamer Runtime..."
          Start-Process -FilePath ".\gstreamer.exe" -ArgumentList "/quiet" -Wait -NoNewWindow

          Write-Host "Installing GStreamer Devel..."
          Start-Process -FilePath ".\gstreamer-devel.exe" -ArgumentList "/quiet" -Wait -NoNewWindow

          # Emulate the deprecated setup-gstreamer action by injecting environment variables
          $gstRoot = "C:\gstreamer\1.0\msvc_x86_64"
          Write-Host "Setting up environment variables for Cargo/pkg-config..."
          
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$gstRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        shell: pwsh
        run: cargo build --release

      - name: Resolve nightly release metadata
        id: release_meta
        shell: pwsh
        run: |
          $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd-HHmmss')
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $runNumber = [int]"${{ github.run_number }}"
          $build = $runNumber % 65535
          if ($build -le 0) {
            $build = 1
          }

          $tag = "nightly-$stamp-run$runNumber-$shortSha"
          $name = "Nightly Build $stamp (run $runNumber, $shortSha)"
          $msiName = "rust-image-viewer-$tag.msi"

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "name=$name"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "msi_name=$msiName"

      - name: Install WiX Toolset v7
        shell: pwsh
        run: |
          $hasWix = dotnet tool list --global | Select-String -Pattern '^\s*wix\s'
          if ($hasWix) {
            dotnet tool update --global wix --version 7.0.0
          } else {
            dotnet tool install --global wix --version 7.0.0
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix eula accept wix7 --acceptEula yes

      - name: Build WiX installer (AppData + bundled GStreamer)
        id: build_installer
        shell: pwsh
        run: |
          $outputPath = Join-Path $PWD "target\wix\${{ steps.release_meta.outputs.msi_name }}"
          .\scripts\build-wix-installer.ps1 `
            -Configuration release `
            -WorkspaceRoot "$PWD" `
            -OutputMsi $outputPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-${{ steps.release_meta.outputs.tag }}
          path: ${{ steps.build_installer.outputs.msi_path }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.build_installer.outputs.msi_path }}
