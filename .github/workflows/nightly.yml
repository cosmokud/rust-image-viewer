name: Nightly Build

on:
  workflow_dispatch:

jobs:
  nightly:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GStreamer
        id: setup_gstreamer
        uses: blinemedical/setup-gstreamer@v1.4.0
        with:
          version: "1.27.90"
          arch: "x86_64"
          msiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.27.90/msvc/gstreamer-1.0-msvc-x86_64-1.27.90.msi
          devMsiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.27.90/msvc/gstreamer-1.0-devel-msvc-x86_64-1.27.90.msi

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        shell: pwsh
        run: cargo build --release

      - name: Resolve nightly release metadata
        id: release_meta
        shell: pwsh
        run: |
          $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd-HHmmss')
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $runNumber = [int]"${{ github.run_number }}"
          $build = $runNumber % 65535
          if ($build -le 0) {
            $build = 1
          }

          $tag = "nightly-$stamp-run$runNumber-$shortSha"
          $name = "Nightly Build $stamp (run $runNumber, $shortSha)"
          $productVersion = "0.0.$build"
          $msiName = "rust-image-viewer-$tag.msi"

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "name=$name"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "product_version=$productVersion"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "msi_name=$msiName"

      - name: Install WiX Toolset v7
        shell: pwsh
        run: |
          $hasWix = dotnet tool list --global | Select-String -Pattern '^\s*wix\s'
          if ($hasWix) {
            dotnet tool update --global wix --version 7.0.0
          } else {
            dotnet tool install --global wix --version 7.0.0
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix eula accept wix7 --acceptEula yes

      - name: Build WiX installer (AppData + bundled GStreamer)
        id: build_installer
        shell: pwsh
        run: |
          $outputPath = Join-Path $PWD "target\wix\${{ steps.release_meta.outputs.msi_name }}"
          .\scripts\build-wix-installer.ps1 `
            -ProductVersion "${{ steps.release_meta.outputs.product_version }}" `
            -Configuration release `
            -WorkspaceRoot "$PWD" `
            -OutputMsi $outputPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-${{ steps.release_meta.outputs.tag }}
          path: ${{ steps.build_installer.outputs.msi_path }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.build_installer.outputs.msi_path }}
