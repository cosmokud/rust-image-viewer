name: Nightly Build

on:
  workflow_dispatch:

jobs:
  nightly:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GStreamer
        id: setup_gstreamer
        uses: blinemedical/setup-gstreamer@v1.4.0
        with:
          version: "1.26.11"
          arch: "x86_64"
          msiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc/gstreamer-1.0-msvc-x86_64-1.26.11.msi
          devMsiUrl: https://gstreamer.freedesktop.org/data/pkg/windows/1.26.11/msvc/gstreamer-1.0-devel-msvc-x86_64-1.26.11.msi

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        shell: pwsh
        run: cargo build --release

      - name: Resolve nightly release metadata
        id: release_meta
        shell: pwsh
        run: |
          $stamp = (Get-Date).ToUniversalTime().ToString('yyyyMMdd-HHmmss')
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $runNumber = [int]"${{ github.run_number }}"
          $build = $runNumber % 65535
          if ($build -le 0) {
            $build = 1
          }

          $tag = "nightly-$stamp-run$runNumber-$shortSha"
          $name = "Nightly Build $stamp (run $runNumber, $shortSha)"

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "name=$name"

      - name: Install WiX Toolset v7
        shell: pwsh
        run: |
          $hasWix = dotnet tool list --global | Select-String -Pattern '^\s*wix\s'
          if ($hasWix) {
            dotnet tool update --global wix --version 7.0.0
          } else {
            dotnet tool install --global wix --version 7.0.0
          }
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix eula accept wix7 --acceptEula yes

      - name: Build WiX installer (AppData + bundled GStreamer)
        id: build_installer
        shell: pwsh
        run: |
          $outputPath = Join-Path $PWD "target\wix\rust-image-viewer-installer.msi"
          .\scripts\build-wix-installer.ps1 `
            -Configuration release `
            -WorkspaceRoot "$PWD" `
            -OutputMsi $outputPath

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "msi_path=$outputPath"

      - name: Copy portable exe
        id: portable_exe
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "target\release\rust-image-viewer.exe"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "exe_path=$exePath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-image-viewer-${{ steps.release_meta.outputs.tag }}
          path: |
            ${{ steps.build_installer.outputs.msi_path }}
            ${{ steps.portable_exe.outputs.exe_path }}

      - name: Create nightly release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_meta.outputs.tag }}" `
            "${{ steps.build_installer.outputs.msi_path }}" `
            "${{ steps.portable_exe.outputs.exe_path }}" `
            --title "${{ steps.release_meta.outputs.name }}" `
            --prerelease `
            --generate-notes
